<html lang="es">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <style>

        }

        .container {

        .header {

            text-align: center;

        }

        }
        .header p {
            font-size: 0.9rem;

        .datos-alumno {
            display: flex;
            flex-wrap: wrap;
            gap: 15px;
            margin-bottom: 25px;
            background: #f8f9fc;
            padding: 15px;
            border-radius: 8px;
        }

        .datos-alumno .campo {
            flex: 1 1 200px;
        }
        .datos-alumno label {
            display: block;
            font-weight: 600;
            font-size: 0.9rem;
            margin-bottom: 4px;
            color: #333;
        }
        .datos-alumno input {
            width: 100%;
            padding: 8px 12px;
            border: 1px solid #ccc;
            border-radius: 6px;
            font-size: 1rem;
        }

        /* Navegación de preguntas */
        .pregunta-nav {

            align-items: center;
            justify-content: space-between;
            margin-bottom: 15px;
            flex-wrap: wrap;
            gap: 10px;

        .pregunta-nav .info {
            font-weight: 600;
            color: #16213e;

            background: #16213e;
            color: white;

            transition: background 0.2s;
            margin: 0 4px;

        .pregunta-nav .botones-nav button:hover:not(:disabled) {
            background: #0f3460;
        }
        .pregunta-nav .botones-nav button:disabled {

        /* Indicador de progreso */
        .progreso {
            display: flex;

            gap: 6px;
            margin-bottom: 20px;

        }

        .progreso .circulo {

            align-items: center;
            justify-content: center;
            font-size: 0.7rem;
            font-weight: bold;
            background: #e0e0e0;
            color: #555;
            transition: 0.2s;
            cursor: default;
        }

        .progreso .circulo.respondida {
            background: #4caf50;
            color: white;
        }
        .progreso .circulo.actual {
            border: 2px solid #16213e;
            transform: scale(1.15);
            background: #16213e;
            color: white;
        }

        /* Pregunta */
        .pregunta-card {
            background: #f9f9fc;
            border-left: 5px solid #16213e;
            padding: 20px 20px 15px 20px;
            border-radius: 8px;
            margin-bottom: 20px;
            min-height: 150px;
        }

        .pregunta-card .pregunta-texto {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 15px;
        }

        .opciones label {
            display: block;
            padding: 8px 10px;
            margin: 4px 0;
            border-radius: 6px;
            background: white;
            border: 1px solid #ddd;
            cursor: pointer;
            transition: 0.15s;
        }

        .opciones label:hover {
            background: #eef2f7;
            border-color: #16213e;
        }

        .opciones input[type="radio"] {
            margin-right: 12px;
            accent-color: #16213e;
            transform: scale(1.1);
        }

        .opciones label.seleccionada {
            background: #d9e3f0;
            border-color: #16213e;
        }

        /* Botón enviar */
        .acciones {
            display: flex;
            justify-content: center;
            margin-top: 15px;
        }

        .btn-enviar {
            background: #16213e;
            color: white;
            border: none;
            padding: 14px 40px;
            font-size: 1.1rem;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            font-weight: 600;
        }

        .btn-enviar:hover:not(:disabled) {
            background: #0f3460;
        }
        .btn-enviar:disabled {
            background: #888;
            cursor: not-allowed;
        }

        /* Cargando */
        .cargando {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #16213e;
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 1s linear infinite;
            display: inline-block;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        /* Resultado */
        .resultado {
            margin-top: 25px;
            padding: 20px;
            border-radius: 8px;
            text-align: center;
            display: none;
        }
        .resultado.exito {
            background: #e8f5e9;
            border: 1px solid #66bb6a;
        }
        .resultado.error {
            background: #ffebee;
            border: 1px solid #ef5350;
        }
        .resultado .nota {
            font-size: 2.2rem;
            font-weight: 700;
            color: #16213e;
        }

        .footer {
            margin-top: 25px;
            text-align: center;
            font-size: 0.8rem;
            color: #999;
        }
    </style>
</head>

<script>
    // ============================================================

    const SUPABASE_URL = "https://etucngqlvlcwmdspbkdv.supabase.co";

    // ============================================================

    const bancoPreguntas = [
        ["¿Cómo se inicializa un arreglo de punteros a objetos 'Producto' en nullptr?", ["Items[i] = nullptr", "*Items[i] = nullptr", "Items = nullptr", "Items[i] = new Producto()"], "Items[i] = nullptr"],

        ["Sintaxis para llamar a un método desde un arreglo directo de objetos 'flota[i]':", ["flota[i].requiereMantenimiento()", "flota->requiereMantenimiento()[i]", "flota[i]->requiereMantenimiento()", "Vehiculo::requiereMantenimiento()"], "flota[i].requiereMantenimiento()"],
        ["Puntero implícito que rompe la ambigüedad si el parámetro se llama igual que el atributo:", ["this->lectura", "Sensor::lectura", "lectura.this", "*this.lectura"], "this->lectura"],

        ["Índice de inicio en un ciclo for para recorrer en reversa desde el penúltimo elemento:", ["total - 2", "total - 1", "total", "i = total - 3"], "total - 2"],
        ["Estructura condicional encadenada secundaria en C++:", ["else if", "elif", "if else", "switch"], "else if"],
        ["Tipo de retorno para una expresión lógica o relacional (verdadero/falso):", ["bool", "boolean", "int", "void"], "bool"],
        ["Operador de acceso a miembros si trabajamos con un arreglo de punteros 'rack[i]':", ["rack[i]->apagar()", "rack[i].apagar()", "rack->apagar()[i]", "(*rack[i])->apagar()"], "rack[i]->apagar()"],
        ["Operación dentro de un while (rpm > 0) para reducir gradualmente la velocidad de un motor:", ["rpm -= 500", "rpm += 500", "break", "continue"], "rpm -= 500"],
        ["Modificador para que los atributos solo sean accesibles por miembros de su misma clase:", ["private:", "protected:", "hidden:", "restrict:"], "private:"],
        ["Sintaxis de parámetro para recibir un arreglo nativo de objetos 'Tarea' en una función:", ["Tarea lista[]", "Tarea lista[limite]", "Array<Tarea> lista", "Tarea& lista"], "Tarea lista[]"],
        ["Rango válido de índices para un arreglo estático de 10 elementos:", ["indice >= 0 && indice < 10", "indice > 0 && indice <= 10", "indice < cajas.length()", "indice != nullptr"], "indice >= 0 && indice < 10"],
        ["Operador nativo para liberar memoria dinámica del Heap creada con 'new':", ["delete f", "f->~Factura()", "free(f)", "delete[] f"], "delete f"],
        ["Actualización de filas para recorrer una matriz bidimensional de forma secuencial:", ["f++", "c++", "f += 2", "lienzo[f]->next()"], "f++"],
        ["Condición lógica para evaluar si un número es par y positivo simultáneamente:", ["cod > 0 && cod % 2 == 0", "cod > 0 || cod % 2 == 0", "cod > 0 AND cod / 2 == 0", "cod % 2 != 1 && cod >= 0"], "cod > 0 && cod % 2 == 0"],
        ["Operador para definir o implementar una función miembro fuera de la clase:", ["::", ".", "->", ":"], "::"],
        ["Sentencia para terminar la ejecución de una función y retornar verdadero de inmediato:", ["return true", "break", "continue", "exit(0)"], "return true"],
        ["Incremento para avanzar de uno en uno el índice en un ciclo while de arreglos:", ["i++", "total--", "i += 2", "precios++"], "i++"],
        ["Sintaxis para instanciar de forma estática en el Stack pasando un argumento string:", ["Impresora miImpresora(\"USB001\")", "Impresora miImpresora = new Impresora(\"USB001\")", "miImpresora = Impresora(\"USB001\")", "Impresora miImpresora.init(\"USB001\")"], "Impresora miImpresora(\"USB001\")"],
        ["Condición del bucle while para extraer datos de una Pila mientras no esté vacía:", ["!estaVacia()", "estaVacia() == true", "tope > 50", "estaVacia"], "!estaVacia()"],
        ["Instanciación dinámica en el Heap con el constructor por defecto:", ["new Conexion()", "Conexion()", "&Conexion", "alloc Conexion()"], "new Conexion()"],
        ["Acumulación correcta para sumar el retorno de un método de un objeto en un arreglo:", ["total += grupo[i].getArea()", "total = grupo[i].getArea()", "total += grupo->getArea()[i]", "total += (*grupo[i]).getArea()"], "total += grupo[i].getArea()"],
        ["Método para evaluar si una variable string de C++ no contiene caracteres:", ["cadena.empty()", "cadena == nullptr", "cadena.length == 0", "cadena->isEmpty()"], "cadena.empty()"],
        ["Paso de actualización para decrementar un ciclo de 100 a 0 unitariamente:", ["i--", "i++", "i = 0", "i -= 2"], "i--"],
        ["Palabra reservada para declarar un atributo constante inmutable en C++:", ["const", "static_cast", "immutable", "final"], "const"],
        ["Condición para verificar saldo suficiente y que la cuenta no esté bloqueada:", ["saldo >= monto && !bloqueada", "saldo > monto || bloqueada == false", "saldo <= monto && bloqueada", "saldo.verificar(monto) && bloqueada"], "saldo >= monto && !bloqueada"],
        ["Sintaxis para invocar un método desde un puntero a objeto:", ["miVehiculo->acelerar()", "miVehiculo.acelerar()", "miVehiculo::acelerar()", "*miVehiculo.acelerar()"], "miVehiculo->acelerar()"],
        ["Tipo de retorno para funciones que solo realizan acciones pero no regresan valores:", ["void", "int", "string", "bool"], "void"],
        ["Sintaxis con 'this' para asignar el parámetro 'id' al atributo homónimo de la clase:", ["this->id = id", "Nodo::id = id", "id.this = id", "*this.id = id"], "this->id = id"],
        ["Condición de un ciclo while para detenerse al llegar al carácter nulo '\\0':", ["texto[i] != '\\0'", "texto[i] == '\0'", "i < texto.length()", "texto != nullptr"], "texto[i] != '\\0'"],
        ["Asignación de tamaño a un arreglo dinámico usando una variable entera 'capacidad':", ["new Sensor[capacidad]", "new Sensor[25[]]", "new Sensor[int capacidad]", "new Sensor[*capacidad]"], "new Sensor[capacidad]"],
        ["Sintaxis formal de una bifurcación condicional múltiple encadenada:", ["else if", "elif", "if else", "switch case"], "else if"],
        ["Declaración estática en el Stack de un arreglo de 8 objetos de la clase 'Boton':", ["Boton interfaz[8]", "class Boton interfaz[]", "new Boton interfaz[8]", "Boton* interfaz[8]"], "Boton interfaz[8]"],
        ["Condición de límite de columnas en una matriz de 5x5 controlada por la variable 'j':", ["j < 5", "j <= 5", "i < 5", "j++"], "j < 5"],
        ["Condición para comprobar si un entero 'n' es exactamente divisible entre 3:", ["n % 3 == 0", "n / 3 == 0", "n % 3 != 0", "n.modulo(3)"], "n % 3 == 0"],
        ["Llamada correcta a un método estático sin instanciar la clase:", ["Config::inicializarEntorno()", "Config.inicializarEntorno()", "Config->inicializarEntorno()", "new Config().inicializarEntorno()"], "Config::inicializarEntorno()"],
        ["Modificación de índice para recorrer un arreglo saltando de 2 en 2:", ["i += 2", "i++", "i = i + 1", "i *= 2"], "i += 2"],
        ["Liberación correcta de un arreglo dinámico dentro del destructor de una clase:", ["delete[] datos", "delete datos", "free(datos)", "datos = nullptr"], "delete[] datos"],
        ["Instrucción para saltar el código restante del ciclo e ir a la siguiente iteración:", ["continue", "break", "return false", "exit"], "continue"]
    ];

    // ============================================================
    // VARIABLES GLOBALES
    // ============================================================
    let preguntasExamen = [];          // Array con preguntas mezcladas
    let respuestas = {};              // Objeto {indice: letraSeleccionada}
    let indiceActual = 0;
    const totalPreguntas = bancoPreguntas.length;

    // ============================================================
    // FUNCIONES AUXILIARES
    // ============================================================
    function shuffleArray(arr) {
        for (let i = arr.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [arr[i], arr[j]] = [arr[j], arr[i]];
        }
        return arr;
    }

    // ============================================================
    // INICIALIZAR EXAMEN
    // ============================================================
    function iniciarExamen() {
        // Mezclar preguntas
        preguntasExamen = shuffleArray([...bancoPreguntas]).map((preg, idx) => {
            const [texto, opciones, correcta] = preg;
            const opcionesMezcladas = shuffleArray([...opciones]);
            return {
                texto,
                opciones: opcionesMezcladas,
                correcta,
                // Almacenamos el índice original para referencia (opcional)
                originalIndex: idx
            };
        });

        // Inicializar respuestas vacías
        respuestas = {};
        for (let i = 0; i < totalPreguntas; i++) {
            respuestas[i] = null;
        }

        // Crear círculos de progreso
        const progresoDiv = document.getElementById('progreso');
        progresoDiv.innerHTML = '';
        for (let i = 0; i < totalPreguntas; i++) {
            const circle = document.createElement('div');
            circle.className = 'circulo';
            circle.id = `circulo-${i}`;
            circle.textContent = i + 1;
            progresoDiv.appendChild(circle);
        }

        // Mostrar primera pregunta
        indiceActual = 0;
        mostrarPregunta(indiceActual);
        actualizarProgreso();
        actualizarBotones();
        document.getElementById('contadorPregunta').textContent = `Pregunta ${indiceActual + 1} de ${totalPreguntas}`;
    }

    // ============================================================
    // MOSTRAR PREGUNTA
    // ============================================================
    function mostrarPregunta(index) {
        const pregunta = preguntasExamen[index];
        if (!pregunta) return;

        document.getElementById('preguntaTexto').textContent = pregunta.texto;

        const opcionesContainer = document.getElementById('opcionesContainer');
        opcionesContainer.innerHTML = '';

        const letras = ['A', 'B', 'C', 'D'];
        pregunta.opciones.forEach((opcion, i) => {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'pregunta';
            radio.value = letras[i];
            radio.addEventListener('change', () => {
                // Guardar respuesta
                respuestas[index] = letras[i];
                actualizarProgreso();
                // Marcar visualmente la opción seleccionada
                document.querySelectorAll('.opciones label').forEach(lb => lb.classList.remove('seleccionada'));
                label.classList.add('seleccionada');
            });

            // Si ya había respuesta seleccionada, la marcamos
            if (respuestas[index] === letras[i]) {
                radio.checked = true;
                label.classList.add('seleccionada');
            }

            label.appendChild(radio);
            label.appendChild(document.createTextNode(` ${letras[i]}) ${opcion}`));
            opcionesContainer.appendChild(label);
        });

        // Actualizar contador
        document.getElementById('contadorPregunta').textContent = `Pregunta ${index + 1} de ${totalPreguntas}`;
    }

    // ============================================================
    // ACTUALIZAR PROGRESO
    // ============================================================
    function actualizarProgreso() {
        for (let i = 0; i < totalPreguntas; i++) {
            const circle = document.getElementById(`circulo-${i}`);
            circle.classList.remove('respondida', 'actual');
            if (respuestas[i] !== null) {
                circle.classList.add('respondida');
            }
            if (i === indiceActual) {
                circle.classList.add('actual');
            }
        }
    }

    // ============================================================
    // ACTUALIZAR BOTONES
    // ============================================================
    function actualizarBotones() {
        document.getElementById('btnAnterior').disabled = (indiceActual === 0);
        document.getElementById('btnSiguiente').disabled = (indiceActual === totalPreguntas - 1);
    }

    // ============================================================
    // NAVEGACIÓN
    // ============================================================
    function irAnterior() {
        if (indiceActual > 0) {
            indiceActual--;
            mostrarPregunta(indiceActual);
            actualizarProgreso();
            actualizarBotones();
        }
    }

    function irSiguiente() {
        if (indiceActual < totalPreguntas - 1) {
            indiceActual++;
            mostrarPregunta(indiceActual);
            actualizarProgreso();
            actualizarBotones();
        }
    }

    // ============================================================
    // ENVIAR EXAMEN (igual que antes, pero con paginación)
    // ============================================================
    async function enviarExamen() {
        const nombre = document.getElementById('nombre').value.trim();
        const matricula = document.getElementById('matricula').value.trim();

        if (!nombre || !matricula) {
            alert('Por favor, ingresa tu nombre y matrícula.');
            return;
        }

        // Verificar que todas las preguntas estén respondidas
        let todasRespondidas = true;
        for (let i = 0; i < totalPreguntas; i++) {
            if (respuestas[i] === null) {
                todasRespondidas = false;
                break;
            }
        }

        if (!todasRespondidas) {
            alert('⚠️ Aún hay preguntas sin responder. Revisa los círculos grises.');
            return;
        }

        // Calcular aciertos
        let aciertos = 0;
        for (let i = 0; i < totalPreguntas; i++) {
            const pregunta = preguntasExamen[i];
            const letraSeleccionada = respuestas[i];
            const idxLetra = ['A', 'B', 'C', 'D'].indexOf(letraSeleccionada);
            const textoSeleccionado = pregunta.opciones[idxLetra];
            if (textoSeleccionado === pregunta.correcta) {
                aciertos++;
            }
        }

        const calificacion = (aciertos / totalPreguntas) * 10;
        const fechaHora = new Date().toISOString();

        // Deshabilitar botones
        document.getElementById('btnEnviar').disabled = true;
        document.getElementById('cargando').style.display = 'block';
        document.getElementById('resultado').style.display = 'none';

        try {
            // 1. Buscar o crear alumno
            let alumnoId = null;

            const buscarResp = await fetch(`${SUPABASE_URL}/rest/v1/alumnos?matricula=eq.${encodeURIComponent(matricula)}&select=id`, {
                headers: {
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                }
            });
            const buscarData = await buscarResp.json();

            if (buscarData && buscarData.length > 0) {
                alumnoId = buscarData[0].id;
            } else {
                const crearResp = await fetch(`${SUPABASE_URL}/rest/v1/alumnos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ matricula, nombre })
                });
                const crearData = await crearResp.json();
                if (crearData && crearData.length > 0) {
                    alumnoId = crearData[0].id;
                } else {
                    throw new Error('No se pudo crear el alumno');
                }
            }

            // 2. Insertar resultado
            const resultado = {
                alumno_id: alumnoId,
                aciertos: aciertos,
                total_preguntas: totalPreguntas,
                calificacion: parseFloat(calificacion.toFixed(2)),
                fecha_hora: fechaHora
            };

            const insertResp = await fetch(`${SUPABASE_URL}/rest/v1/resultados`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify(resultado)
            });

            if (!insertResp.ok) {
                const errorText = await insertResp.text();
                throw new Error(`Error al guardar resultado: ${errorText}`);
            }

            mostrarResultado(true, nombre, matricula, aciertos, totalPreguntas, calificacion);

        } catch (error) {
            console.error(error);
            mostrarResultado(false, nombre, matricula, aciertos, totalPreguntas, calificacion, error.message);
        } finally {
            document.getElementById('btnEnviar').disabled = false;
            document.getElementById('cargando').style.display = 'none';
        }
    }

    function mostrarResultado(exito, nombre, matricula, aciertos, total, calificacion, errorMsg = '') {
        const div = document.getElementById('resultado');
        div.style.display = 'block';
        div.className = 'resultado ' + (exito ? 'exito' : 'error');

        if (exito) {
            div.innerHTML = `
                <h2>🎉 ¡Examen completado!</h2>
                <p><strong>Alumno:</strong> ${nombre} (${matricula})</p>
                <p><strong>Aciertos:</strong> ${aciertos} de ${total}</p>
                <p class="nota">Calificación: ${calificacion.toFixed(2)} / 10</p>
                <p style="color: green;">✅ Resultados guardados en la nube.</p>
            `;
        } else {
            div.innerHTML = `
                <h2>⚠️ Error al guardar</h2>
                <p><strong>Alumno:</strong> ${nombre} (${matricula})</p>
                <p><strong>Aciertos:</strong> ${aciertos} de ${total}</p>
                <p class="nota">Calificación: ${calificacion.toFixed(2)} / 10</p>
                <p style="color: red;">❌ No se pudieron guardar los resultados: ${errorMsg}</p>
            `;
        }
    }

    // ============================================================
    // EVENTOS Y CARGA INICIAL
    // ============================================================
    document.getElementById('btnAnterior').addEventListener('click', irAnterior);
    document.getElementById('btnSiguiente').addEventListener('click', irSiguiente);
    document.getElementById('btnEnviar').addEventListener('click', enviarExamen);

    // Teclas de navegación (flechas)
    document.addEventListener('keydown', (e) => {
        if (e.key === 'ArrowLeft') irAnterior();
        if (e.key === 'ArrowRight') irSiguiente();
    });

    window.onload = iniciarExamen;
</script>

</body>
</html>

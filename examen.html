    let examenFinalizado = false;

    const btnAnt = document.getElementById('btnAnterior');
    const btnSig = document.getElementById('btnSiguiente');
    const btnEnviar = document.getElementById('btnEnviar');
    const timerDisplay = document.getElementById('timerDisplay');
    const progressFill = document.getElementById('progressFill');
    const pregCounter = document.getElementById('pregCounter');
    const categoriaLabel = document.getElementById('categoriaLabel');
    const enunciadoDiv = document.getElementById('enunciado');
    const codigoDiv = document.getElementById('codigoContainer');
    const opcionesDiv = document.getElementById('opcionesContainer');
    const resultadoDiv = document.getElementById('resultado');
    const cargandoDiv = document.getElementById('cargando');

    // ============================================================
    // RENDERIZADO
    // ============================================================
    function renderPregunta(index) {
        const p = preguntas[index];
        enunciadoDiv.textContent = p.enunciado;
        if (p.codigo) {
            codigoDiv.style.display = 'block';
            codigoDiv.textContent = p.codigo;
        } else {
            codigoDiv.style.display = 'none';
        }
        opcionesDiv.innerHTML = '';
        p.opciones.forEach((texto, i) => {
            const label = document.createElement('label');
            const radio = document.createElement('input');
            radio.type = 'radio';
            radio.name = 'pregunta';
            radio.value = i;
            if (respuestas[index] === i) radio.checked = true;
            radio.addEventListener('change', () => {
                respuestas[index] = i;
                actualizarBotonEnviar();
            });
            label.appendChild(radio);
            label.appendChild(document.createTextNode(' ' + texto));
            opcionesDiv.appendChild(label);
        });

        pregCounter.textContent = `${index+1} / ${total}`;
        const pct = ((index+1) / total) * 100;
        progressFill.style.width = pct + '%';
        categoriaLabel.textContent = p.categoria || 'General';

        btnAnt.disabled = (index === 0);
        btnSig.textContent = (index === total-1) ? '📤 Finalizar' : 'Siguiente ▶';
        actualizarBotonEnviar();
    }

    function actualizarBotonEnviar() {
        const todasRespondidas = respuestas.every(r => r !== null);
        btnEnviar.disabled = !todasRespondidas;
        btnEnviar.style.opacity = todasRespondidas ? '1' : '0.6';
    }

    // ============================================================
    // NAVEGACIÓN
    // ============================================================
    function irAPregunta(index) {
        if (index < 0 || index >= total || examenFinalizado) return;
        current = index;
        renderPregunta(current);
    }

    btnAnt.addEventListener('click', () => irAPregunta(current-1));
    btnSig.addEventListener('click', () => {
        if (current === total-1) {
            enviarExamen();
        } else {
            irAPregunta(current+1);
        }
    });

    // ============================================================
    // TEMPORIZADOR
    // ============================================================
    function iniciarTemporizador() {
        timerInterval = setInterval(() => {
            tiempoRestante--;
            actualizarTiempo();
            if (tiempoRestante <= 0) {
                clearInterval(timerInterval);
                alert('⏰ Tiempo agotado. El examen se enviará automáticamente.');
                enviarExamen();
            }
        }, 1000);
    }

    function actualizarTiempo() {
        const mins = Math.floor(tiempoRestante / 60);
        const segs = tiempoRestante % 60;
        timerDisplay.textContent = `${String(mins).padStart(2,'0')}:${String(segs).padStart(2,'0')}`;
        timerDisplay.classList.toggle('warning', tiempoRestante < 60);
    }

    // ============================================================
    // ENVIAR EXAMEN (incluye grupo y ciclo)
    // ============================================================
    async function enviarExamen() {
        if (examenFinalizado) return;

        const nombre = document.getElementById('nombre').value.trim();
        const matricula = document.getElementById('matricula').value.trim();
        const grupo = document.getElementById('grupo').value.trim();
        const ciclo = document.getElementById('ciclo').value;

        if (!nombre || !matricula || !grupo || !ciclo) {
            alert('Por favor, completa todos los datos (nombre, matrícula, grupo y ciclo).');
            return;
        }

        const todasRespondidas = respuestas.every(r => r !== null);
        if (!todasRespondidas) {
            alert('Aún hay preguntas sin responder. Revisa la barra de progreso.');
            return;
        }

        // Calcular aciertos
        let aciertos = 0;
        for (let i=0; i<total; i++) {
            if (respuestas[i] === preguntas[i].correcta) aciertos++;
        }
        const calificacion = (aciertos / total) * 10;

        // Deshabilitar interfaz
        btnEnviar.disabled = true;
        btnSig.disabled = true;
        btnAnt.disabled = true;
        cargandoDiv.style.display = 'block';
        resultadoDiv.style.display = 'none';

        try {
            // 1. Obtener o crear alumno
            let alumnoId = null;
            const buscarResp = await fetch(`${SUPABASE_URL}/rest/v1/alumnos?matricula=eq.${encodeURIComponent(matricula)}&select=id`, {
                headers: { 'apikey': SUPABASE_KEY, 'Authorization': `Bearer ${SUPABASE_KEY}` }
            });
            const buscarData = await buscarResp.json();
            if (buscarData && buscarData.length > 0) {
                alumnoId = buscarData[0].id;
            } else {
                const crearResp = await fetch(`${SUPABASE_URL}/rest/v1/alumnos`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'apikey': SUPABASE_KEY,
                        'Authorization': `Bearer ${SUPABASE_KEY}`,
                        'Prefer': 'return=representation'
                    },
                    body: JSON.stringify({ matricula, nombre })
                });
                const crearData = await crearResp.json();
                if (crearData && crearData.length > 0) alumnoId = crearData[0].id;
                else throw new Error('No se pudo crear el alumno');
            }

            // 2. Guardar resultado (incluye grupo y ciclo)
            const resultado = {
                alumno_id: alumnoId,
                aciertos: aciertos,
                total_preguntas: total,
                calificacion: parseFloat(calificacion.toFixed(2)),
                fecha_hora: new Date().toISOString(),
                grupo: grupo,
                ciclo: ciclo
            };

            const insertResp = await fetch(`${SUPABASE_URL}/rest/v1/resultados`, {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'apikey': SUPABASE_KEY,
                    'Authorization': `Bearer ${SUPABASE_KEY}`
                },
                body: JSON.stringify(resultado)
            });

            if (!insertResp.ok) {
                const errorText = await insertResp.text();
                throw new Error(`Error al guardar: ${errorText}`);
            }

            examenFinalizado = true;
            clearInterval(timerInterval);
            mostrarResultado(true, nombre, matricula, grupo, ciclo, aciertos, calificacion);

        } catch (error) {
            console.error(error);
            mostrarResultado(false, nombre, matricula, grupo, ciclo, aciertos, calificacion, error.message);
        } finally {
            cargandoDiv.style.display = 'none';
            btnEnviar.disabled = false;
        }
    }

    function mostrarResultado(exito, nombre, matricula, grupo, ciclo, aciertos, calificacion, errorMsg = '') {
        resultadoDiv.style.display = 'block';
        resultadoDiv.className = 'resultado' + (exito ? '' : ' error');
        if (exito) {
            resultadoDiv.innerHTML = `
                <h2>🎉 ¡Examen completado!</h2>
                <p><strong>Alumno:</strong> ${nombre} (${matricula})</p>
                <p><strong>Grupo:</strong> ${grupo}  |  <strong>Ciclo:</strong> ${ciclo}</p>
                <p><strong>Aciertos:</strong> ${aciertos} de ${total}</p>
                <p class="nota">${calificacion.toFixed(2)} / 10</p>
                <p style="color: green;">✅ Resultados guardados en la nube.</p>
            `;
        } else {
            resultadoDiv.innerHTML = `
                <h2>⚠️ Error al guardar</h2>
                <p><strong>Alumno:</strong> ${nombre} (${matricula})</p>
                <p><strong>Grupo:</strong> ${grupo}  |  <strong>Ciclo:</strong> ${ciclo}</p>
                <p><strong>Aciertos:</strong> ${aciertos} de ${total}</p>
                <p class="nota">${calificacion.toFixed(2)} / 10</p>
                <p style="color: red;">❌ No se pudieron guardar los resultados: ${errorMsg}</p>
                <p>Verifica tu conexión a Supabase.</p>
            `;
        }
        btnAnt.disabled = true;
        btnSig.disabled = true;
        btnEnviar.disabled = true;
    }

    // ============================================================
    // INICIALIZACIÓN
    // ============================================================
    window.onload = function() {
        renderPregunta(0);
        iniciarTemporizador();
        actualizarBotonEnviar();
        btnEnviar.addEventListener('click', enviarExamen);
    };
</script>
</body>
</html>
